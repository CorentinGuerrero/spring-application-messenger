messenger:
  validation:
    enabled: true
  events:
    error-strategy: fail-fast
  routing:
    commands:
      RegisterUser: sync
      SendWelcomeEmail: rabbitmq
      RebuildUserSearchIndex: kafka
    events:
      UserRegistered: pg-outbox
  transports:
    rabbitmq:
      enabled: true
      exchange: messenger.example
      routing-keys:
        SendWelcomeEmail: mail.welcome
      consumer:
        enabled: true
        queues: messenger.example.mail
    kafka:
      enabled: true
      topics:
        RebuildUserSearchIndex: messenger.example.user-index
      consumer:
        enabled: true
        topics: messenger.example.user-index
        group-id: messenger-example
    jdbc-outbox:
      enabled: true
      initialize-schema: true
      table-name: messenger_outbox
      publisher:
        enabled: false
        target-transport: sync

example:
  run-demo: true

spring:
  datasource:
    url: jdbc:h2:mem:messenger_example;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: io.github.applicationmessenger.messenger.transport.TransportMessage
