messenger:
  validation:
    enabled: true
  events:
    error-strategy: fail-fast
  routing:
    commands:
      RegisterUser: sync
    events:
      UserRegistered: pg-outbox
  transports:
    jdbc-outbox:
      enabled: true
      initialize-schema: true
      table-name: messenger_outbox
      publisher:
        enabled: false
        target-transport: sync

example:
  run-demo: true

spring:
  datasource:
    url: jdbc:h2:mem:messenger_example;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
